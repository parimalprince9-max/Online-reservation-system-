<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Payroll Management System</h1>
            <p>Manage Full-time and Part-time Employee Salaries</p>
        </header>

        <section class="form-section">
            <form id="payrollForm">
                <div class="input-group">
                    <input type="text" id="empName" placeholder="Employee Name" required>
                    <input type="number" id="empId" placeholder="Employee ID" required>
                </div>

                <div class="input-group">
                    <select id="empType" onchange="toggleInputs()">
                        <option value="full-time">Full-Time (Monthly)</option>
                        <option value="part-time">Part-Time (Hourly)</option>
                    </select>
                    <input type="number" id="salaryInput" placeholder="Base Salary / Hourly Rate" required>
                </div>

                <div id="extraInput" class="input-group">
                    <input type="number" id="hoursWorked" placeholder="Hours Worked" style="display:none;">
                </div>

                <button type="submit" id="addBtn">Add Employee</button>
            </form>
        </section>

        <section class="table-section">
            <table id="payrollTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Final Salary</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="employeeList">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
