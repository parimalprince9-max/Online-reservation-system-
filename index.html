<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Account System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2c3e50, #3498db);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 30px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
        }

        .container {
            margin: 40px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px black;
        }

        h2 {
            color: #2c3e50;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2c3e50;
        }
    </style>
</head>

<body>

<header>
    Bank Account System
</header>

<div class="container">

    <div class="box">
        <h2>Project Features</h2>
        <p>Create Account, Deposit Money, Withdraw Money, Check Balance</p>
    </div>

    <div class="box">
        <h2>OOP Concepts Used</h2>
        <p>Encapsulation, Inheritance, Polymorphism, Abstraction</p>
    </div>

    <div class="box">
        <h2>About Project</h2>
        <p>This Java project simulates a real banking system using Object-Oriented Programming concepts.</p>
    </div>

    <div class="box">
        <h2>Demo Action</h2>
        <button onclick="showMessage()">Click for Demo</button>
        <p id="msg"></p>
    </div>

</div>

<script>
    function showMessage() {
        document.getElementById("msg").innerHTML = "Transaction Successful!";
    }
</script>

</body>
</html>
